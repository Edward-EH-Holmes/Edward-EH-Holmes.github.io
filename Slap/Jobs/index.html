<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./image/images.png" type="image/x-icon">
  <title>与 AI 乔布斯的对话</title>
  <link rel="stylesheet" href="./CSS/style.css" />
</head>
<body>

  <!-- 顶部标题栏 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <div class="header-icon">🍎</div>
        <div>
          <h1>与 AI 乔布斯的对话</h1>
          <p>Steve Jobs Digital Life · DeepSeek R1 本地微调</p>
        </div>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>在线</span>
      </div>
    </div>
  </header>

  <!-- 技术栈标签栏 -->
  <div class="tech-bar">
    <div class="tech-bar-inner">
      <span class="tech-bar-label">技术栈</span>
      <div id="tech-stack"></div>
    </div>
  </div>

  <!-- 聊天主体 -->
  <main>
    <div class="chat-container">

      <!-- 视频播放区域 -->
      <div class="video-section">
        <video id="main-video" controls preload="metadata">
          <source src="./video/intro.mp4" type="video/mp4">
          <p class="video-fallback">您的浏览器不支持 HTML5 视频，请 <a href="./video/intro.mp4">点击下载</a>。</p>
        </video>
        <div class="video-caption">Steve Jobs Digital Life · AI 生成视频</div>
      </div>

      <div id="chat-feed"></div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <p>本页面内容由 LM Studio · DeepSeek R1 乔布斯人格训练模型生成</p>
    <p>语音合成：Qwen3-TTS &nbsp;|&nbsp; 视频生成：ComfyUI LTX-2.3</p>
  </footer>

  <!-- 数据与逻辑 -->
  <script src="./JavaScript/conversations.js"></script>
  <script src="./JavaScript/main.js"></script>

</body>
</html>
